name: Daily Updates

on:
  schedule:
    # Runs at 8:30 AM IST (IST = UTC+5:30 → 03:00 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download script
        env:
          DOWNLOAD_TOKEN: ${{ secrets.DOWNLOAD_TOKEN }}
        run: |
          curl -s -o script.py "https://cuberk.com/download/?token=$DOWNLOAD_TOKEN"

      - name: Run script
        env:
          API_KEYS: ${{ secrets.API_KEYS }}
        run: python script.py

      - name: Update README.md
        run: cp new_updates.md README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "Web Crawler AI [Bot]"
          git config --global user.email "webcrawler-bot@win3zz.noreply.github.com"
          git add README.md 
          git commit -m "🔄 Daily update"
          git push
